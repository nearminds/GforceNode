name: Release gforce-node

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-aarch64
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-aarch64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            platform: windows-aarch64
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz — unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gforce-node dist/
          cp target/${{ matrix.target }}/release/gforce-node-daemon dist/
          cd dist && tar -czf ../gforce-node-${{ matrix.platform }}.tar.gz *

      - name: Package (zip — windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gforce-node.exe" dist/
          Copy-Item "target/${{ matrix.target }}/release/gforce-node-daemon.exe" dist/
          Compress-Archive -Path dist/* -DestinationPath "gforce-node-${{ matrix.platform }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gforce-node-${{ matrix.platform }}
          path: gforce-node-${{ matrix.platform }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gforce-node-*.tar.gz
            gforce-node-*.zip
          generate_release_notes: true
